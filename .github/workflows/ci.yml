name: "CI"

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: "Tests"

    strategy:
      fail-fast: false
      matrix:
        sidekiq: ['= 7', '= 7.3']
        ruby: ['3.0.0', '3.1', '3.2', '3.3', '3.4']
        rack: ['~> 2.2', '>= 3.1.0']
        include:
          # Sidekiq < 7 is only compatible with Rack ~> 2.0
          - sidekiq: '= 6.5'
            ruby: '3.2'
            rack: '~> 2.0'
          - sidekiq: '= 6.5'
            ruby: '3.3'
            rack: '~> 2.0'
          - sidekiq: '= 6.5'
            ruby: '3.4'
            rack: '~> 2.0'
          # Sidekiq 8 is only compatible with Ruby >= 3.2 and Rack >= 3.1
          - sidekiq: '= 8'
            ruby: '3.2'
            rack: '>= 3.1.0'
          - sidekiq: '= 8'
            ruby: '3.3'
            rack: '>= 3.1.0'
          - sidekiq: '= 8'
            ruby: '3.4'
            rack: '>= 3.1.0'

    env:
      RACK_VERSION: "${{ matrix.rack }}"
      SIDEKIQ_VERSION: "${{ matrix.sidekiq }}"

    services:
      redis:
        image: "redis@sha256:f4e03de519aa22dc6c0a42e4afb10ef8ff15d818e9d388b0782060e2a4dd583d"
        ports: ["6379:6379"]

    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          persist-credentials: false

      - name: "Set up Ruby"
        uses: "ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5" # v1.301.0
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: "Install dependencies"
        run: bundle install

      - name: "Run specs"
        run: "CAPYBARA_DRIVER=selenium_chrome_headless bundle exec rspec --format progress"

      - name: "Run Rubocop"
        run: "bundle exec rubocop"

      - name: "Upload coverage to Qlty"
        if: matrix.ruby == '3.4' && matrix.sidekiq == '= 7' && matrix.rack == '>= 3.1.0'
        uses: qltysh/qlty-action/coverage@a19242102d17e497f437d7466aa01b528537e899 # v2.2.0
        with:
          oidc: true
          files: coverage/.resultset.json
